name: Morning Companion reminder

on:
  schedule:
    # every 10 minutes — GitHub may delay this by a few minutes under load,
    # which is fine since the server-side window check tolerates that.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

jobs:
  ping-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminder"
